# Keygen CE — self-hosted license server + this admin dashboard, one stack.
# TLS for your domain is terminated by your own reverse proxy in front of
# this stack, not by anything in here.
#
# All values come from ./.env (see .env.example).
# First run: see README.md — `docker compose up -d` handles setup
# automatically (see the `setup` service below); the secrets in .env still
# have to be generated by hand first, setup can't invent those.

name: keygen

services:
  # One-shot bootstrap, gated so it only ever does real work exactly once.
  #
  # `keygen:setup` (what `web setup` used to be run manually) is NOT safe to
  # re-run against a live database — it depends on `db:schema:load`, which
  # redefines every table and would wipe existing data. It has no built-in
  # "skip if already done" check of its own (`Account.create!` just fails
  # loudly on a duplicate ID — that part's safe — but schema:load runs
  # first, unconditionally, every time the task fires).
  #
  # This gates it two ways:
  #   1. A marker file in its own dedicated volume — the fast path once
  #      set up; skips without touching the database at all.
  #   2. If the marker is somehow missing (fresh volume pointed at an
  #      existing DB, a mistake, whatever) but `accounts` already has rows,
  #      it refuses to proceed rather than silently destroying data, and
  #      tells you how to fix it by hand.
  # Only a genuinely empty database with no marker actually runs setup.
  setup:
    image: keygen/api:latest
    restart: "no"
    # The image runs as a non-root `keygen` user by default, but named
    # volumes are root-owned until something chowns them — without this,
    # touching the marker file fails with permission denied. Verified via a
    # live test: that failure mode is worse than it looks, since it means
    # setup "succeeds" (real accounts get created) but the marker never
    # gets written, so the NEXT boot hits the safety check with accounts
    # already present and refuses to start web/worker at all. Root is fine
    # here — this is a narrow, one-shot init step; web/worker are untouched.
    user: root
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        MARKER=/setup-data/.setup-complete

        if [ -f "$$MARKER" ]; then
          echo "Keygen already set up (marker found) — skipping."
          exit 0
        fi

        ACCOUNT_COUNT=$$(psql "$$DATABASE_URL" -tAc "SELECT COUNT(*) FROM accounts" 2>/dev/null || echo 0)

        if [ "$$ACCOUNT_COUNT" != "0" ]; then
          echo "ERROR: setup marker is missing, but the database already has $$ACCOUNT_COUNT account(s)."
          echo "Refusing to run keygen:setup — it would run db:schema:load against a live database."
          echo "If this is expected (e.g. a fresh marker volume pointed at an existing DB), create the"
          echo "marker by hand instead:"
          echo "  docker compose run --rm setup sh -c 'touch \$$MARKER'"
          exit 1
        fi

        echo "No existing account found — running one-time Keygen setup..."
        bundle exec rails keygen:setup
        touch "$$MARKER"
        echo "Setup complete — marker written to $$MARKER."
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      KEYGEN_EDITION: ${KEYGEN_EDITION}
      KEYGEN_MODE: ${KEYGEN_MODE}
      KEYGEN_ACCOUNT_ID: ${KEYGEN_ACCOUNT_ID}
      KEYGEN_ADMIN_EMAIL: ${KEYGEN_ADMIN_EMAIL}
      KEYGEN_ADMIN_PASSWORD: ${KEYGEN_ADMIN_PASSWORD}
      KEYGEN_HOST: ${KEYGEN_HOST}
      SECRET_KEY_BASE: ${SECRET_KEY_BASE}
      ENCRYPTION_DETERMINISTIC_KEY: ${ENCRYPTION_DETERMINISTIC_KEY}
      ENCRYPTION_PRIMARY_KEY: ${ENCRYPTION_PRIMARY_KEY}
      ENCRYPTION_KEY_DERIVATION_SALT: ${ENCRYPTION_KEY_DERIVATION_SALT}
      DATABASE_URL: postgres://${KEYGEN_DB_USER}:${KEYGEN_DB_PASSWORD}@postgres:5432/${KEYGEN_DB_NAME}
      REDIS_URL: redis://redis:6379
    volumes:
      - keygen_setup_marker:/setup-data

  web:
    image: keygen/api:latest
    command: web
    restart: unless-stopped
    depends_on:
      setup:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      KEYGEN_EDITION: ${KEYGEN_EDITION}
      KEYGEN_MODE: ${KEYGEN_MODE}
      KEYGEN_ACCOUNT_ID: ${KEYGEN_ACCOUNT_ID}
      KEYGEN_HOST: ${KEYGEN_HOST}
      SECRET_KEY_BASE: ${SECRET_KEY_BASE}
      ENCRYPTION_DETERMINISTIC_KEY: ${ENCRYPTION_DETERMINISTIC_KEY}
      ENCRYPTION_PRIMARY_KEY: ${ENCRYPTION_PRIMARY_KEY}
      ENCRYPTION_KEY_DERIVATION_SALT: ${ENCRYPTION_KEY_DERIVATION_SALT}
      DATABASE_URL: postgres://${KEYGEN_DB_USER}:${KEYGEN_DB_PASSWORD}@postgres:5432/${KEYGEN_DB_NAME}
      REDIS_URL: redis://redis:6379
      # Artifact storage — EXTERNAL S3-compatible server (managed
      # separately). Presigned upload/download URLs are handed to clients,
      # so the endpoint must be the PUBLIC domain of that server.
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_BUCKET: ${AWS_BUCKET}
      AWS_REGION: ${AWS_REGION}
      AWS_ENDPOINT: ${AWS_ENDPOINT}
      AWS_FORCE_PATH_STYLE: "true"

  worker:
    image: keygen/api:latest
    command: worker
    restart: unless-stopped
    depends_on:
      setup:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      KEYGEN_EDITION: ${KEYGEN_EDITION}
      KEYGEN_MODE: ${KEYGEN_MODE}
      KEYGEN_ACCOUNT_ID: ${KEYGEN_ACCOUNT_ID}
      KEYGEN_HOST: ${KEYGEN_HOST}
      SECRET_KEY_BASE: ${SECRET_KEY_BASE}
      ENCRYPTION_DETERMINISTIC_KEY: ${ENCRYPTION_DETERMINISTIC_KEY}
      ENCRYPTION_PRIMARY_KEY: ${ENCRYPTION_PRIMARY_KEY}
      ENCRYPTION_KEY_DERIVATION_SALT: ${ENCRYPTION_KEY_DERIVATION_SALT}
      DATABASE_URL: postgres://${KEYGEN_DB_USER}:${KEYGEN_DB_PASSWORD}@postgres:5432/${KEYGEN_DB_NAME}
      REDIS_URL: redis://redis:6379
      # Artifact storage — EXTERNAL S3-compatible server (managed
      # separately). Presigned upload/download URLs are handed to clients,
      # so the endpoint must be the PUBLIC domain of that server.
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_BUCKET: ${AWS_BUCKET}
      AWS_REGION: ${AWS_REGION}
      AWS_ENDPOINT: ${AWS_ENDPOINT}
      AWS_FORCE_PATH_STYLE: "true"

  # Admin dashboard (this repo). Built from the repo root, not pulled as an
  # image — Dokploy (or `docker compose build`) builds it the same way it
  # always has, just as one service in this stack instead of its own
  # separate app.
  #
  # No nginx shim in between: `ui` and `web` are services in this same
  # compose file, so they already share a Docker network directly and can
  # reach each other by service name. The only obstacle is Rails' own `Host`
  # authorization and `force_ssl`, which a plain `http://web:3000` request
  # would otherwise fail — the dashboard's own proxy route
  # (src/app/api/keygen/[...path]/route.ts) sets the `Host` and
  # `X-Forwarded-Proto` headers itself when KEYGEN_INTERNAL_HOST is set,
  # reproducing what a real HTTPS request through the public domain looks
  # like, entirely in application code. Verified against the actual
  # node-fetch call this route makes — it does respect an explicit Host
  # header override (some HTTP clients silently ignore it; this one doesn't).
  #
  # NEXT_PUBLIC_KEYGEN_API_URL is a build arg (Next.js bakes NEXT_PUBLIC_* in
  # at build time); KEYGEN_INTERNAL_HOST is a plain runtime env var (that
  # route is server-only, so it can read it fresh on every request — no
  # rebuild needed to change it).
  ui:
    build:
      context: ../..
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_KEYGEN_API_URL: http://web:3000/v1
        NEXT_PUBLIC_KEYGEN_SINGLEPLAYER: "true"
        NEXT_PUBLIC_KEYGEN_ACCOUNT_ID: ${KEYGEN_ACCOUNT_ID}
    restart: unless-stopped
    environment:
      KEYGEN_INTERNAL_HOST: ${KEYGEN_HOST}
    depends_on:
      - web
    # Not published to a host port — Dokploy attaches Traefik routing to
    # whichever service/port you designate as this app's exposed one (port
    # 3000 here), same mechanism it already uses for every other service in
    # this file that has no `ports:` section.

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${KEYGEN_DB_USER}
      POSTGRES_PASSWORD: ${KEYGEN_DB_PASSWORD}
      POSTGRES_DB: ${KEYGEN_DB_NAME}
    volumes:
      - keygen_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${KEYGEN_DB_USER} -d ${KEYGEN_DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - keygen_redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  keygen_pgdata:
  keygen_redisdata:
  # Tiny, dedicated volume — just the one-time setup marker. Separate from
  # keygen_pgdata on purpose: this is the thing that must survive even if
  # someone rebuilds/moves the Postgres volume, since its whole job is
  # telling `setup` "don't touch the database again."
  keygen_setup_marker:
